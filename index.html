lCarsForAvg.length?petrolCarsForAvg.reduce((s,c)=>{let fuelPrice=FUEL_PRICES[global.city]?.petrol||100;let derate=0.8;let realKmpl=c.mileage*derate;return s+(fuelPrice/realKmpl)},0)/petrolCarsForAvg.length:6.5;let avgEvCostPerKm=evCarsForAvg.length?evCarsForAvg.reduce((s,c)=>{let fuelPrice=FUEL_PRICES[global.city]?.ev||7;let derate=0.85;let realKmpl=c.mileage*derate;return s+(fuelPrice/realKmpl)},0)/evCarsForAvg.length:1.2;let annualEvSaving=(avgPetrolCostPerKm-avgEvCostPerKm)*global.km;document.getElementById("evSave").innerHTML=`<div class="insight">At ${global.km.toLocaleString()} km/yr, an EV saves ~₹${Math.round(annualEvSaving).toLocaleString()} in fuel annually (based on real fleet averages).</div>`}function module6(){const html='<div class="module active"><div class="brand-grid" style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;" id="brandGrid"></div><div class="grid-2"><div class="card"><canvas id="maintBar"></canvas></div><div class="card"><div class="card-title">Service schedule</div><select id="maintBrand">'+MAINT_BRANDS.map(b=>`<option>${b.name}</option>`).join("")+'</select><table id="svcTable"><thead><tr><th>km</th><th>Type</th><th>Cost</th></tr></thead><tbody></tbody></table></div></div><div class="card"><div class="card-title">Maintenance cost calculator</div><div>Annual km <input type="number" id="maintKm" value="15000"></div><div id="maintResult"></div></div></div>';document.getElementById("appContainer").innerHTML=html;MAINT_BRANDS.forEach(b=>{document.getElementById("brandGrid").innerHTML+=`<div style="background:#1a1e26;padding:12px;border-radius:12px;"><b>${b.name}</b><br>₹${b.annualCost}/yr<br>Reliability ${b.reliability}</div>`});charts[6]={};charts[6].bar=new Chart(document.getElementById("maintBar"),{type:"bar",data:{labels:MAINT_BRANDS.map(b=>b.name),datasets:[{data:MAINT_BRANDS.map(b=>b.annualCost),backgroundColor:"#f4a623"}]}});function updateSvc(){let brand=document.getElementById("maintBrand").value;let b=MAINT_BRANDS.find  class="value">₹${(tco.total/100000).toFixed(1)}L</div><div class="insight">5‑year TCO = ₹${(tco.total/1000).toFixed(0)}k · ₹/km: ${(tco.total/(global.km*5)).toFixed(2)}</div>`;if(charts[7]?.stack) charts[7].stack.destroy();charts[7]={};charts[7].stack=new Chart(document.getElementById("tcoStack"),{type:"bar",data:{labels:["Fuel","Maint","Depreciation","Insurance"],datasets:[{data:[tco.fuelCost/1000,tco.maint/1000,tco.dep/1000,tco.ins/1000],backgroundColor:["#3b82f6","#22c55e","#f4a623","#a855f7"]}]},options:{plugins:{legend:{display:false}}}});let carA=CARS_DB.find(c=>c.name===document.getElementById("tcoA").value);let carB=CARS_DB.find(c=>c.name===document.getElementById("tcoB").value);let tA=computeTCO(carA);let tB=computeTCO(carB);document.getElementById("tcoCompare").innerHTML=`<div class="grid-2"><div class="card">${carA.name}<br>5y TCO: ₹${(tA.total/100000).toFixed(1)}L</div><div class="card">${carB.name}<br>5y TCO: ₹${(tB.total/100000).toFixed(1)}L</div></div>`}document.getElementById("tcoCar").onchange=update;document.getElementById("tcoA").onchange=update;document.getElementById("tcoB").onchange=update;update()}function module8(){const html='<div class="module active"><div class="grid-2"><div class="card"><div class="card-title">Parameters</div><select id="nvModel">'+CARS_DB.filter(c=>c.fuel!=="Electric").map(c=>`<option>${c.name}</option>`).join("")+'</select><label>Used age (years)</label><input type="range" id="nvAge" min="1" max="6" value="3"><span id="ageVal">3</span><label>Condition</label><select id="nvCond"><option value="0.95">Good</option><option value="0.85">Average</option></select><div id="nvResult"></div></div><div class="card"><canvas id="nvLine"></canvas></div></div></div>';document.getElementById("appContainer").innerHTML=html;function update(){let model=document.getElementById("nvModel").value;let age=+document.getElementById("nvAge").value;let cond=+document.getElementById("nvCond").value;document.getElementById("ageVal").innerText=age;let car=CARS_DB.find(c=>c.name===model);let brandRates=DEPRECIATION[car.brand]||[0.18,.12,.09,.07,0.06];let retained=1;for(let i=0;i<age;i++) retained*=(1-brandRates[i]);let usedPrice=car.price*retained*cond;let saving=car.price-usedPrice;document.getElementById("nvResult").innerHTML=`<div class="value">Used price: ₹${(usedPrice/100000).toFixed(1)}L</div><div class="insight">Upfront saving: ₹${(saving/100000).toFixed(1)}L</div>`;if(charts[8]?.line) charts[8].line.destroy();charts[8]={};let years=[0,1,2,3,4,5];charts[8].line=new Chart(document.getElementById("nvLine"),{type:"line",data:{labels:years,datasets:[{label:"New",data:years.map(y=>car.price+y*60000),borderColor:"#3b82f6"},{label:"Used",data:years.map(y=>usedPrice+y*70000),borderColor:"#f4a623"}]}})}document.getElementById("nvModel").onchange=update;document.getElementById("nvAge").oninput=update;document.getElementById("nvCond").onchange=update;update()}function module9(){const html='<div class="module active"><div class="grid-2"><div class="card"><div class="card-title">Your car details</div><select id="resaleBrand">'+Object.keys(DEPRECIATION).map(b=>`<option>${b}</option>`).join("")+'</select><input type="number" id="resalePrice" value="1000000" placeholder="Purchase price"><div id="resaleResult"></div></div><div class="card"><canvas id="resaleCurve"></canvas></div></div><div class="card"><div class="card-title">Brand resale ranking (3 yr retained)</div><table id="rankTable"><thead><tr><th>Brand</th><th>3yr retained</th><th>5yr retained</th></tr></thead><tbody></tbody></table></div></div>';document.getElementById("appContainer").innerHTML=html;let rankings=Object.entries(DEPRECIATION).map(([brand,rates])=>{let ret3=(1-rates[0])*(1-rates[1])*(1-rates[2])*100;let ret5=ret3*(1-rates[3])*(1-rates[4])*100/100;return{brand,ret3:Math.round(ret3),ret5:Math.round(ret5)}}).sort((a,b)=>b.ret3-a.ret3);document.querySelector("#rankTable tbody").innerHTML=rankings.map(r=>`<tr><td>${r.brand}</td><td class="mono">${r.ret3}%</td><td class="mono">${r.ret5}%</td></tr>`).join("");function predict(){let brand=document.getElementById("resaleBrand").value;let price=+document.getElementById("resalePrice").value;let rates=DEPRECIATION[brand]||[0.18,.12,.09,0.07];let ret3=price*(1-rates[0])*(1-rates[1])*(1-rates[2]);document.getElementById("resaleResult").innerHTML=`<div class="value">₹${(ret3/100000).toFixed(1)}L</div><div class="insight">Estimated resale after 3 years</div>`;if(charts[9]?.curve) charts[9].curve.destroy();charts[9]={};let vals=[price,price*(1-rates[0]),price*(1-rates[0])*(1-rates[1]),ret3,ret3*(1-rates[3]),ret3*(1-rates[3])*(1-rates[4]||0.06)];charts[9].curve=new Chart(document.getElementById("resaleCurve"),{type:"line",data:{labels:["New","1y","2y","3y","4y","5y"],datasets:[{data:vals,borderColor:"#f4a623",fill:false}]}})}document.getElementById("resaleBrand").onchange=predict;document.getElementById("resalePrice").oninput=predict;predict()}function module10(){const html='<div class="module active"><div id="wizardContainer"></div><div id="recResults" style="display:none;" class="grid-3"></div></div>';document.getElementById("appContainer").innerHTML=html;let step=0;let answers={budget:global.budget/100000,useCase:"mixed",fuel:"petrol",passengers:4,priority:"mileage",cityType:"moderate",condition:"new"};const questions=[{q:"What is your budget (₹L)?",type:"slider",key:"budget",min:5,max:50,val:12},{q:"Primary use case?",type:"select",key:"useCase",opts:["daily_city","highway","family","mixed"]},{q:"Preferred fuel?",type:"select",key:"fuel",opts:["petrol","diesel","ev","cng"]},{q:"Regular passengers?",type:"select",key:"passengers",opts:[2,4,5,7]},{q:"Top priority?",type:"select",key:"priority",opts:["mileage","safety","resale","comfort"]},{q:"City driving type?",type:"select",key:"cityType",opts:["dense","moderate","open"]},{q:"New or used?",type:"select",key:"condition",opts:["new","certified","any"]}];function renderWizard(){let q=questions[step];let html=`<div class="wizard-step">${questions.map((_,i)=>`<button class="wiz-btn ${i===step?"active":i<step?"done":""}" onclick="goStep(${i})">${i+1}</button>`).join("")}</div><div class="card"><h3>${q.q}</h3>`;if(q.type==="slider") html+=`<input type="range" id="wizSlider" min="${q.min}" max="${q.max}" step="1" value="${answers[q.key]}"><span id="wizVal">${answers[q.key]}L</span>`;else html+=`<select id="wizSelect">${q.opts.map(o=>`<option ${answers[q.key]==o?"selected":""}>${o}</option>`).join("")}</select>`;html+=`<div style="margin-top:20px;"><button class="btn-download" onclick="prevStep()">Back</button><button class="btn-download" style="background:var(--accent2);" onclick="nextStep()">Next</button></div></div>`;document.getElementById("wizardContainer").innerHTML=html;if(q.type==="slider") document.getElementById("wizSlider").oninput=(e)=>{answers[q.key]=e.target.value;document.getElementById("wizVal").innerText=e.target.value+"L"};else document.getElementById("wizSelect").onchange=(e)=>answers[q.key]=e.target.value}window.goStep=(i)=>{step=i;renderWizard()};window.prevStep=()=>{if(step>0){step--;renderWizard()}};window.nextStep=()=>{if(step<6){step++;renderWizard()}else{recommend()}};function recommend(){let filtered=CARS_DB.filter(c=>{let priceL=c.price/100000;let budgetOk=priceL<=answers.budget*1.05;let fuelOk=(answers.fuel==="any"||answers.fuel==="petrol"||answers.fuel==="diesel"||answers.fuel==="ev"||answers.fuel==="cng")?c.fuel.toLowerCase().includes(answers.fuel):true;let seatsOk=c.seats>=answers.passengers;return budgetOk&&fuelOk&&seatsOk});let scoredCars=filtered.map(car=>{let score=0;if(answers.priority==="mileage") score+=(car.scores?.mileage||50);else if(answers.priority==="safety") score+=(car.scores?.safety||50);else if(answers.priority==="resale") score+=(car.scores?.resale||50);else if(answers.priority==="comfort") score+=(car.scores?.comfort||50);if(answers.cityType==="dense") score+=(car.cityFit?.dense||50);else if(answers.cityType==="moderate") score+=(car.cityFit?.moderate||50);else if(answers.cityType==="open") score+=(car.cityFit?.open||50);if(answers.useCase==="daily_city"&&car.fuel==="Electric") score+=15;if(answers.useCase==="highway"&&car.seats>=5) score+=10;if(answers.useCase==="family"&&car.seats>=5) score+=15;return{...car,score}});let topCars=scoredCars.sort((a,b)=>b.score-a.score).slice(0,3);if(topCars.length===0){document.getElementById("recResults").innerHTML=`<div class="insight">No cars match your criteria. Try increasing budget or changing fuel preference.</div>`;document.getElementById("recResults").style.display="block";document.getElementById("wizardContainer").style.display="none";return}let recHtml=topCars.map((car,idx)=>`<div class="rec-card ${idx===0?"top":""}"><div class="rec-score">${Math.round(car.score)}</div><div class="rec-name">${car.name}</div><div class="insight">${car.pros?car.pros[0]:"Great match for your needs"}</div><div>${car.fuel} · ₹${(car.price/100000).toFixed(1)}L</div><div>Seats: ${car.seats} · ${car.mileage} km/l (ARAI)</div></div>`).join("");document.getElementById("recResults").style.display="grid";document.getElementById("recResults").innerHTML=recHtml;document.getElementById("wizardContainer").style.display="none"}renderWizard()}function init(){document.querySelectorAll(".tab").forEach(tab=>{tab.addEventListener("click",()=>{document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));tab.classList.add("active");loadModule(parseInt(tab.dataset.module))})});loadModule(1)}init();</script></body></html>
